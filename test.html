<!DOCTYPE html>
<html>
<head>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="config.js"></script>
</head>
<body>
<h3>Firebase Auth Test</h3>
<button onclick="testLogin()">Test Login</button>
<p id="result"></p>
<script>
function testLogin() {
    auth.signInWithEmailAndPassword('admin@cryptomart.com', 'Admin123!')
        .then(() => document.getElementById('result').textContent = 'LOGIN SUCCESS')
        .catch(err => document.getElementById('result').textContent = 'ERROR: ' + err.message);
}
</script>
</body>
</html>
