<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — CryptoMart Admin</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="config.js"></script>
<style>
:root {
    --primary: #6c5ce7; --primary-dark: #5a4bd1; --secondary: #00cec9;
    --dark: #2d3436; --light: #f8f9fa; --gray: #636e72; --gray-light: #dfe6e9;
    --success: #00b894; --danger: #e17055; --warning: #fdcb6e;
    --shadow: 0 8px 32px rgba(0,0,0,0.08); --radius: 16px; --radius-sm: 8px;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--light); color:var(--dark); }
.navbar {
    background:#fff; padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--gray-light); box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.navbar .logo { font-size:1.2rem; font-weight:800; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.navbar .user-info { display:flex; align-items:center; gap:12px; }
.navbar .user-info span { font-size:0.85rem; color:var(--gray); }
.navbar .logout-btn { padding:8px 16px; border:none; background:var(--danger); color:#fff; border-radius:var(--radius-sm); cursor:pointer; font-size:0.85rem; font-weight:600; transition:var(--transition); }
.navbar .logout-btn:hover { opacity:0.85; }
.container { max-width:1000px; margin:0 auto; padding:32px 24px; }
.tabs { display:flex; gap:8px; margin-bottom:24px; border-bottom:2px solid var(--gray-light); padding-bottom:8px; }
.tabs button { padding:10px 24px; border:none; background:transparent; font-weight:600; color:var(--gray); cursor:pointer; transition:var(--transition); border-radius:var(--radius-sm); font-size:0.9rem; }
.tabs button.active { background:var(--primary); color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }
.card { background:#fff; border-radius:var(--radius); padding:28px; box-shadow:var(--shadow); margin-bottom:24px; }
.card h3 { font-size:1.1rem; font-weight:700; margin-bottom:16px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:0.8rem; font-weight:600; color:var(--gray); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
.form-group input, .form-group textarea { width:100%; padding:10px 14px; border:2px solid var(--gray-light); border-radius:var(--radius-sm); font-size:0.9rem; outline:none; transition:var(--transition); }
.form-group input:focus, .form-group textarea:focus { border-color:var(--primary); }
.form-group textarea { resize:vertical; min-height:60px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.btn { padding:10px 24px; border:none; background:var(--primary); color:#fff; font-weight:600; border-radius:var(--radius-sm); cursor:pointer; transition:var(--transition); font-size:0.9rem; }
.btn:hover { background:var(--primary-dark); }
.btn.danger { background:var(--danger); }
.btn.danger:hover { background:#d63031; }
.btn.success { background:var(--success); }
.btn.success:hover { background:#00a381; }
.btn.secondary { background:var(--gray-light); color:var(--dark); }
.btn.secondary:hover { background:#ccc; }

.orders-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
.orders-table th, .orders-table td { padding:10px 8px; text-align:left; border-bottom:1px solid var(--gray-light); }
.orders-table th { font-weight:600; color:var(--gray); font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; }
.orders-table .status { padding:4px 10px; border-radius:50px; font-size:0.75rem; font-weight:600; }
.orders-table .status.pending { background:rgba(253,203,110,0.2); color:#e17055; }
.orders-table .status.processing { background:rgba(108,92,231,0.12); color:var(--primary); }
.orders-table .status.shipped { background:rgba(0,184,148,0.12); color:var(--success); }
.orders-table .status.cancelled { background:rgba(225,112,85,0.12); color:var(--danger); }
.orders-table .actions { display:flex; gap:4px; flex-wrap:wrap; }
.orders-table .actions button { padding:4px 10px; border:none; border-radius:4px; font-size:0.7rem; font-weight:600; cursor:pointer; transition:var(--transition); }
.orders-table .actions .confirm-btn { background:var(--success); color:#fff; }
.orders-table .actions .cancel-btn { background:var(--danger); color:#fff; }
.orders-table .actions .ship-btn { background:var(--primary); color:#fff; }
.orders-table .actions .info-btn { background:var(--secondary); color:#fff; }
.orders-table .actions button:hover { opacity:0.8; }

.product-list-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--gray-light); }
.product-list-item img { width:50px; height:50px; border-radius:6px; object-fit:cover; background:var(--gray-light); }
.product-list-item .info { flex:1; }
.product-list-item .info strong { font-size:0.9rem; }
.product-list-item .info span { font-size:0.8rem; color:var(--gray); }

.upload-area { border:2px dashed var(--gray-light); border-radius:var(--radius-sm); padding:24px; text-align:center; cursor:pointer; transition:var(--transition); margin-bottom:12px; }
.upload-area:hover { border-color:var(--primary); background:rgba(108,92,231,0.02); }
.upload-area.has-image { border-color:var(--success); background:rgba(0,184,148,0.02); }
.upload-area img { max-width:100%; max-height:200px; border-radius:var(--radius-sm); }
.upload-area p { color:var(--gray); font-size:0.85rem; margin-top:8px; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:6000; background:var(--dark); color:#fff; padding:14px 24px; border-radius:60px; font-size:0.9rem; font-weight:500; box-shadow:0 16px 48px rgba(0,0,0,0.2); opacity:0; pointer-events:none; transition:var(--transition); }
.toast.show { opacity:1; pointer-events:all; }

@media (max-width:768px) { .form-row { grid-template-columns:1fr; } .orders-table { font-size:0.75rem; } .orders-table th,.orders-table td { padding:6px 4px; } }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<nav class="navbar">
    <div class="logo">&#x1f6e1;&#xfe0f; CryptoMart Admin</div>
    <div class="user-info">
        <span id="adminEmail"></span>
        <a href="index.html" style="font-size:0.85rem;color:var(--gray);margin-right:8px;">View Store</a>
        <button class="logout-btn" onclick="adminLogout()">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="tabs">
        <button class="active" onclick="switchTab('products',this)">Manage Products</button>
        <button onclick="switchTab('orders',this)">Orders</button>
    </div>

    <!-- PRODUCTS TAB -->
    <div class="tab-content active" id="tabProducts">
        <div class="card">
            <h3>Add / Edit Product</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="apName" placeholder="Wireless Headphones" />
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="apPrice" placeholder="49.99" step="0.01" />
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="apDesc" placeholder="Short product description..."></textarea>
            </div>
            <div class="form-group">
                <label>Product Image</label>
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)" />
                    <div id="uploadPreview">
                        <p style="font-size:1.5rem;margin-bottom:4px;">&#x1f4c1;</p>
                        <p>Click to upload an image from your computer</p>
                        <p style="font-size:0.75rem;color:var(--gray);">PNG, JPG, WebP accepted</p>
                    </div>
                    <img id="uploadedImage" style="display:none" />
                </div>
                <p id="uploadStatus" style="font-size:0.8rem;color:var(--gray);margin-top:4px;"></p>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn" onclick="saveProduct()">&#128190; Save Product</button>
                <button class="btn secondary" onclick="resetForm()">Reset</button>
            </div>
        </div>

        <div class="card">
            <h3>All Products</h3>
            <div id="productList"></div>
        </div>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab-content" id="tabOrders">
        <div class="card">
            <h3>All Orders</h3>
            <div style="overflow-x:auto;">
                <table class="orders-table">
                    <thead><tr><th>Tracking</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="ordersBody"></tbody>
                </table>
            </div>
            <div id="ordersEmpty" style="text-align:center;padding:20px;color:var(--gray);display:none;">No orders yet.</div>
        </div>
    </div>
</div>

<script>
let editingProductId = null;
let selectedFile = null;
let uploadedImageUrl = '';

/* ===== AUTH GUARD ===== */
auth.onAuthStateChanged((user) => {
    if (!user) {
        window.location.href = 'admin.html';
    } else {
        document.getElementById('adminEmail').textContent = user.email;
        loadProducts();
        loadOrders();
    }
});

function adminLogout() {
    auth.signOut().then(() => {
        sessionStorage.removeItem('adminLoggedIn');
        window.location.href = 'admin.html';
    });
}

/* ===== TOAST ===== */
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

/* ===== TAB SWITCHING ===== */
function switchTab(tab, btn) {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

/* ===== FILE UPLOAD HANDLING ===== */
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('uploadPreview').style.display = 'none';
        const img = document.getElementById('uploadedImage');
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById('uploadArea').classList.add('has-image');
        document.getElementById('uploadStatus').textContent = 'File selected: ' + file.name;
    };
    reader.readAsDataURL(file);
}

async function uploadImage(file) {
    if (!file) return null;
    const storageRef = storage.ref();
    const fileRef = storageRef.child('products/' + Date.now() + '_' + file.name);
    try {
        const snapshot = await fileRef.put(file);
        const url = await snapshot.ref.getDownloadURL();
        return url;
    } catch (error) {
        console.error('Upload error:', error);
        showToast('Image upload failed. Please try again.');
        return null;
    }
}

/* ===== PRODUCT CRUD ===== */
function resetForm() {
    editingProductId = null;
    selectedFile = null;
    document.getElementById('apName').value = '';
    document.getElementById('apPrice').value = '';
    document.getElementById('apDesc').value = '';
    document.getElementById('uploadPreview').style.display = 'block';
    document.getElementById('uploadedImage').style.display = 'none';
    document.getElementById('uploadArea').classList.remove('has-image');
    document.getElementById('uploadStatus').textContent = '';
    document.getElementById('fileInput').value = '';
}

async function saveProduct() {
    const name = document.getElementById('apName').value.trim();
    const price = parseFloat(document.getElementById('apPrice').value);
    const desc = document.getElementById('apDesc').value.trim();

    if (!name || isNaN(price) || price <= 0) {
        showToast('Valid name and price required.');
        return;
    }

    let imageUrl = uploadedImageUrl;

    // Upload new image if selected
    if (selectedFile) {
        document.querySelector('.btn').textContent = 'Uploading...';
        document.querySelector('.btn').disabled = true;
        imageUrl = await uploadImage(selectedFile);
        document.querySelector('.btn').textContent = 'Save Product';
        document.querySelector('.btn').disabled = false;
        if (!imageUrl) return; // upload failed
    }

    try {
        if (editingProductId) {
            // Update existing
            const updateData = { name, price, desc: desc || 'No description.' };
            if (imageUrl) updateData.image = imageUrl; // only update image if new one uploaded
            await db.collection('products').doc(editingProductId).update(updateData);
            showToast('Product updated!');
        } else {
            // New product
            await db.collection('products').add({
                name,
                price,
                desc: desc || 'No description.',
                image: imageUrl || ''
            });
            showToast('Product added!');
        }
        resetForm();
    } catch (error) {
        console.error('Error saving product:', error);
        showToast('Error saving product.');
    }
}

function editProduct(id) {
    const doc = products.find(p => p.id === id);
    if (!doc) return;
    editingProductId = id;
    document.getElementById('apName').value = doc.name;
    document.getElementById('apPrice').value = doc.price;
    document.getElementById('apDesc').value = doc.desc || '';
    if (doc.image) {
        uploadedImageUrl = doc.image;
        document.getElementById('uploadPreview').style.display = 'none';
        const img = document.getElementById('uploadedImage');
        img.src = doc.image;
        img.style.display = 'block';
        document.getElementById('uploadArea').classList.add('has-image');
        document.getElementById('uploadStatus').textContent = 'Existing image';
    }
}

function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    db.collection('products').doc(id).delete()
        .then(() => showToast('Product deleted.'))
        .catch(err => { console.error(err); showToast('Error deleting product.'); });
}

let products = [];
function loadProducts() {
    db.collection('products').orderBy('name').onSnapshot((snapshot) => {
        products = [];
        const list = document.getElementById('productList');
        snapshot.forEach((doc) => {
            products.push({ id: doc.id, ...doc.data() });
        });
        if (!products.length) {
            list.innerHTML = '<p style="color:var(--gray);">No products yet. Add your first one above.</p>';
            return;
        }
        list.innerHTML = products.map(p => `
            <div class="product-list-item">
                ${p.image ? `<img src="${p.image}" onerror="this.style.display='none'" />` : '<div style="width:50px;height:50px;border-radius:6px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">&#x1f4e6;</div>'}
                <div class="info"><strong>${escHtml(p.name)}</strong> <span>— $${(p.price||0).toFixed(2)}</span></div>
                <button class="btn" style="padding:4px 12px;font-size:0.75rem;" onclick="editProduct('${p.id}')">Edit</button>
                <button class="btn danger" style="padding:4px 12px;font-size:0.75rem;" onclick="deleteProduct('${p.id}')">Del</button>
            </div>
        `).join('');
    });
}

function escHtml(s) { if(typeof s!=='string')return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ===== ORDERS ===== */
function loadOrders() {
    db.collection('orders').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
        const tbody = document.getElementById('ordersBody');
        const empty = document.getElementById('ordersEmpty');
        if (snapshot.empty) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        tbody.innerHTML = '';
        snapshot.forEach((doc) => {
            const o = doc.data();
            o.id = doc.id;
            const sc = o.status==='cancelled'?'cancelled':(o.status==='shipped'?'shipped':o.status==='processing'?'processing':'pending');
            const pl = o.paymentMethod==='crypto'?'Crypto':'Cash/D';
            const ps = o.paymentStatus==='confirmed'?'Paid':o.paymentStatus==='expired'?'Exp':'Pend';
            tbody.innerHTML += `<tr>
                <td><strong>${o.tracking}</strong></td>
                <td>${escHtml(o.customer.name)}<br/><span style="font-size:0.7rem;color:var(--gray);">${escHtml(o.customer.email)}</span></td>
                <td>${o.items.map(i=>`${i.qty}x ${escHtml(i.productName)}`).join(', ')}</td>
                <td>$${(o.total||0).toFixed(2)}</td>
                <td>${pl} (${ps})</td>
                <td><span class="status ${sc}">${o.status}</span></td>
                <td><div class="actions">
                    ${o.status!=='cancelled'&&o.paymentStatus!=='expired'?`<button class="confirm-btn" onclick="confirmPay('${o.id}')">Pay</button>`:''}
                    ${o.status!=='cancelled'?`<button class="cancel-btn" onclick="cancelOrder('${o.id}')">X</button>`:''}
                    ${(o.paymentStatus==='confirmed'||o.status==='processing')&&o.status!=='shipped'&&o.status!=='cancelled'?`<button class="ship-btn" onclick="markShipped('${o.id}')">Ship</button>`:''}
                    <button class="info-btn" onclick="updateDelivery('${o.id}','${escHtml(o.deliveryInfo||'')}')">Info</button>
                </div></td>
            </tr>`;
        });
    });
}

function confirmPay(id) { db.collection('orders').doc(id).update({paymentStatus:'confirmed',status:'processing'}); showToast('Payment confirmed.'); }
function cancelOrder(id) { if(!confirm('Cancel this order?'))return; db.collection('orders').doc(id).update({status:'cancelled',paymentStatus:'cancelled'}); showToast('Order cancelled.'); }
function markShipped(id) { db.collection('orders').doc(id).update({status:'shipped'}); showToast('Marked as shipped.'); }
function updateDelivery(id, current) {
    const info = prompt('Delivery info:', current || '');
    if (info !== null) { db.collection('orders').doc(id).update({deliveryInfo: info}); showToast('Delivery info updated.'); }
}
</script>
</body>
</html>
